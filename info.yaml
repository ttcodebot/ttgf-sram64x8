# Tiny Tapeout project information
project:
  title:        "64x8 SRAM"      # Project title
  author:       "ttcodebot"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Open Circuit Design gf180 64x8 (512-bit) SRAM macro on a single 1x1 digital tile"
  language:     "Verilog"
  clock_hz:     50000000       # 50 MHz (CLOCK_PERIOD 20ns)

  # How many tiles your design occupies?
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2 or 6x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_ttcodebot_sram64x8"

  # List your project's source files here. Source files must be in ./src and listed one per line:
  source_files:
    - "project.v"
    - "gf180mcu_ocd_ip_sram__sram64x8m8wm1.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "addr[0]"
  ui[1]: "addr[1]"
  ui[2]: "addr[2]"
  ui[3]: "addr[3]"
  ui[4]: "addr[4]"
  ui[5]: "addr[5]"
  ui[6]: "we (1=write, 0=read)"
  ui[7]: "cs (1=enabled, 0=standby)"

  # Outputs
  uo[0]: "Q[0] read data"
  uo[1]: "Q[1] read data"
  uo[2]: "Q[2] read data"
  uo[3]: "Q[3] read data"
  uo[4]: "Q[4] read data"
  uo[5]: "Q[5] read data"
  uo[6]: "Q[6] read data"
  uo[7]: "Q[7] read data"

  # Bidirectional pins (used as inputs: write data)
  uio[0]: "D[0] write data"
  uio[1]: "D[1] write data"
  uio[2]: "D[2] write data"
  uio[3]: "D[3] write data"
  uio[4]: "D[4] write data"
  uio[5]: "D[5] write data"
  uio[6]: "D[6] write data"
  uio[7]: "D[7] write data"

# Do not change!
yaml_version: 6
